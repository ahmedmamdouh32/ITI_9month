<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT-like App</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div>
                    <h1>Chat AI</h1>
                    <p>Modern assistant with memory</p>
                </div>
                <button id="new-chat-btn" class="primary-btn">+ New Chat</button>
            </div>

            <div class="chat-list" id="chat-list"></div>

            <div class="settings-panel">
                <h2>Settings</h2>
                <div class="setting-item">
                    <label>OpenAI API Key</label>
                    <input id="api-key-input" type="password" placeholder="Paste your OpenAI key" />
                    <small>Stored locally for this browser only.</small>
                </div>
                <div class="setting-item">
                    <label>Response Mode</label>
                    <div class="toggle-group">
                        <button data-mode="text" class="mode-btn">Text</button>
                        <button data-mode="audio" class="mode-btn">Audio</button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-panel">
            <div class="chat-header">
                <div>
                    <h2 id="chat-title">New Chat</h2>
                    <p id="chat-subtitle">Start a conversation or upload a file.</p>
                </div>
            </div>

            <div class="messages-container" id="messages-container"></div>

            <div class="composer">
                <div class="composer-actions">
                    <label class="upload-label">
                        <input id="file-input" type="file" accept="image/*,.pdf,.txt" hidden />
                        Upload
                    </label>
                    <span class="hint">Press Enter to send</span>
                </div>
                <div class="input-bar">
                    <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
                    <button id="send-btn" class="primary-btn">Send</button>
                </div>
            </div>
        </main>
    </div>
    <audio id="audio-player" hidden></audio>
    <script src="app.js"></script>
</body>

</html>
