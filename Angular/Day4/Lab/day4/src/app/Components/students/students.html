<div class="container mt-3">
    <div class="row ">
        @for (student of students; track $index) {
        <div class="col-md-4">
            <app-student-card-component [student]="student"
                (myEvent)="storeSelectedStudent($event)"></app-student-card-component>
        </div>
        }
    </div>
</div>

<div class="container w-100 d-flex justify-content-center">
    @if (selectedStudent) {
    <div class="mt-5">
        <div class="row">
            <div class="col-12">
                <h2>Selected Student Details</h2>
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Name : {{selectedStudent.name}}</h5>
                        <p class="card-text">Track : {{selectedStudent.track}}</p>
                        <p class="card-text">Grade : {{selectedStudent.grade}}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    }
</div>
