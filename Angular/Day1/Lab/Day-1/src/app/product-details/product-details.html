<div class="col-lg-3 mt-4 col-10 mx-auto mb-4 ">
    <div class="card" style="width: 18rem;" appHoverText>
        <div class="d-flex justify-content-center">
            <img class="w-50 object-fit-cover" [attr.src]="product.image" [attr.alt]="product.name">
        </div>
        <div class="card-body">
            <span class="badge" [ngClass]="product.inStock ? 'bg-success' : 'bg-danger'">Out of Stock</span>
            <h5 class="card-title">{{product.name}}</h5>

            <p class="card-text">{{product.description | descriptionFormat:28}}</p>
            <p>{{product.rating | ratingFormat}}</p>
            <p class="fw-bold fs-5" [ngStyle]="{color: product.price > 100 ? 'red' : 'green' }">
                {{product.price}}$</p>
            <div class="d-flex justify-content-center">
                <button class="btn btn-primary w-50" (click)="AddToCart(product.name)">Add to cart</button>
            </div>

        </div>
    </div>
</div>
