<div class="d-flex justify-content-center">
    <h3>Discover Our top rated Products</h3>
</div>

<div class="container">
    <div class="row">

        <select [(ngModel)]="selectedCategory">
            <option value="all">all</option>
            @for(category of categories; track $index){
            <option value="{{category}}">{{category}}</option>
            }
        </select>

        @for(p of getSelectedProducts(); track $index) {
        <!-- @for(p of products; track $index) { -->
        <div class="col-lg-3 mt-4 col-10 mx-auto mb-4 ">
            <div class="card" style="width: 18rem;">
                <div class="d-flex justify-content-center">
                    <img class="w-50 object-fit-cover" [src]="p.image" [attr.alt]="p.name">
                </div>
                <div class="card-body">
                    <span class="badge" [ngClass]="p.inStock ? 'bg-success' : 'bg-danger'">Out of Stock</span>

                    <h5 class="card-title">{{p.name}}</h5>
                    <p class="card-text">Some quick example text to build on the card title and make up the bulk of the
                        card's content.</p>
                    <p class="fw-bold fs-5" [ngStyle]="{color: p.price > 100 ? 'red' : 'green' }">
                        {{p.price}}$</p>
                    <div class="d-flex justify-content-center">
                        <button class="btn btn-primary w-50" (click)="AddToCart(p.name)">Add to cart</button>
                    </div>
                </div>
            </div>
        </div>
        }
        @empty {
        <h3>No products found</h3>
        }
    </div>
</div>
