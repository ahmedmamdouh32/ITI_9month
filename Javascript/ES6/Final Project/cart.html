    <script>
        let totalCartQuantity = localStorage.getItem("totalCartQuantity");
        const cartItemsSpan = document.getElementById('cartItemsSpan');
        const subtotalTextTag = document.getElementById('subtotalTextTag');
        const subtotalPriceTag = document.getElementById('subtotalPriceTag');
        const taxCostTag = document.getElementById('taxCostTag');
        const totalOrderPriceTag = document.getElementById('totalOrderPriceTag');
        let totalOrderPrice = 0;



        if (totalCartQuantity !== null) {
            cartItemsSpan.innerText = totalCartQuantity;
        }

        function renderProduct(product) {
            const container = document.getElementById('products_grid');
            const card = document.createElement('div');
            const productQantity = localStorage.getItem(product.id);
            card.className = "card border-0 mb-4 rounded-4 overflow-hidden";
            card.style = "background-color: #fdfcfa";
            card.innerHTML =
                `
                <div class="card-body p-4">
                        <div class="row g-3 align-items-start">
                            <div class="col-auto">
                                <img src=${product.image}
                                    class="rounded-3 object-fit-cover" style="width: 80px; height: 80px;"
                                    alt="${product.name}">
                            </div>
                            <div class="col">
                                <div class="d-flex flex-wrap justify-content-between align-items-start">
                                    <div class="mb-2">
                                        <h3 class="h6 fw-semibold mb-1" style="color: #1a1a1a;">${product.name}</h3>
                                        <div class="d-flex gap-3 small" style="color: #707070;">
                                            <span>${product.category}</span>
                                        </div>
                                        <span class="fw-bold fs-6" style="color: #2C5F2D;">${product.price}</span>
                                    </div>
                                    <button class="btn btn-link p-0 text-secondary-emphasis border-0"
                                        style="color: #a0a0a0;">
                                        <i class="bi bi-trash3 fs-6"></i>
                                    </button>
                                </div>
                                <div class="d-flex flex-wrap justify-content-between align-items-center mt-3">
                                    <span class="fw-bold fs-6 total" style="color: #2C5F2D;">Total : $${(Number(product.price) * Number(productQantity)).toFixed(2)}</span>
                                    <div class="d-flex align-items-center gap-2">
                                        <button
                                            class="btn btn-sm rounded-3 d-flex align-items-center justify-content-center btn-dash"
                                            style="background-color: #f7f4ef; width: 32px; height: 32px; padding: 0;">
                                            <i class="bi bi-dash" style="color: #4a4a4a;"></i>
                                        </button>
                                        <span class="fw-semibold text-center quantity"
                                            style="width: 32px; color: #1a1a1a;">${productQantity}</span>
                                        <button
                                            class="btn btn-sm rounded-3 d-flex align-items-center justify-content-center btn-plus"
                                            style="background-color: #f7f4ef; width: 32px; height: 32px; padding: 0;">
                                            <i class="bi bi-plus" style="color: #4a4a4a;"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
            `;
            const incQuantityBtn = card.querySelector('.btn-plus');
            const decQuantityBtn = card.querySelector('.btn-dash');
            const quantity = card.querySelector('.quantity');
            const totalPrice = card.querySelector('.total');
            incQuantityBtn.addEventListener('click', () => {
                quantity.innerText = Number(quantity.innerText) + 1;
                totalOrderPrice += product.price;
                totalPrice.innerText = `Total : $${(Number(product.price) * Number(quantity.innerText)).toFixed(2)}`;
                OrderCalculations(totalOrderPrice);
                //save current quantinty in the local storage
                localStorage.setItem(product.id, Number(localStorage.getItem(product.id)) + 1);
                localStorage.setItem('totalCartQuantity', Number(localStorage.getItem('totalCartQuantity')) + Number(1));
                cartItemsSpan.innerText = localStorage.getItem('totalCartQuantity');
            });

            decQuantityBtn.addEventListener('click', () => {
                if (quantity.innerText > 1) {
                    quantity.innerText = Number(quantity.innerText) - 1;
                    totalOrderPrice -= product.price;
                    totalPrice.innerText = `Total : $${(Number(product.price) * Number(quantity.innerText)).toFixed(2)}`;
                    OrderCalculations(totalOrderPrice);
                    //save current quantinty in the local storage
                    localStorage.setItem(product.id, Number(localStorage.getItem(product.id)) - 1);
                    localStorage.setItem('totalCartQuantity', Number(localStorage.getItem('totalCartQuantity')) - Number(1));
                    cartItemsSpan.innerText = localStorage.getItem('totalCartQuantity');
                }
            });





            container.prepend(card);
        }









        //cart products:
        fetch('https://69bea7ae17c3d7d977929e89.mockapi.io/TownTeen/products')
            .then(res => res.json())
            .then(data => {
                for (let product of data) {
                    if (localStorage.getItem(product.id) !== null) {
                        renderProduct(product);
                        totalOrderPrice += Number((Number(product.price) * Number(localStorage.getItem(product.id))).toFixed(2));
                    }
                };
                const totalCartQuantity = localStorage.getItem('totalCartQuantity');
                if (totalCartQuantity !== null) {
                    subtotalTextTag.innerText = `Subtotal (${totalCartQuantity} items)`;
                    OrderCalculations(totalOrderPrice);
                }
                else {
                    subtotalTextTag.innerText = `Subtotal (0 items)`;
                }
            });


        function OrderCalculations(orderPrice) {
            subtotalPriceTag.innerText = orderPrice.toFixed(2);
            console.log(orderPrice);
            taxCostTag.innerText = (orderPrice * 0.1).toFixed(2);
            totalOrderPriceTag.innerText = (orderPrice * 1.1).toFixed(2);

        }


    </script>
