<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StyleShop | Products - Premium Fashion</title>
    <!-- Bootstrap 5 CSS (no custom CSS, only Bootstrap utilities) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (alternative to lucide/iconify, but we keep universal style) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- No custom CSS - all styling uses Bootstrap classes only -->
    <!-- Google Fonts for clean typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <!-- Header -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-custom">
            <div class="container-fluid p-0">
                <!-- Brand Logo -->
                <a class="navbar-brand-custom" href="#">
                    <i class="bi bi-handbag"></i>
                    <span>ModernWear</span>
                </a>

                <!-- Navbar toggler (hamburger button) - visible only on mobile/tablet -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                    aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <i class="bi bi-list fs-1" style="color: #2C5F2D;"></i>
                </button>

                <!-- Collapsible navbar content: links and icons (icons also reposition on collapse) -->
                <div class="collapse navbar-collapse justify-content-between" id="mainNavbar">

                    <div class="d-none d-lg-block" style="width: 120px;"></div>

                    <!-- Centered navigation links on desktop, left on collapse -->
                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-4 gap-2">
                        <li class="nav-item">
                            <a class="nav-link" href="home.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active fw-semibold" href="products_index.html">Products</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="cart.html">Cart</a>
                        </li>
                    </ul>

                    <!-- Right side icons: search & shopping bag with badge -->
                    <div class="nav-icons ms-auto mt-3 mt-lg-0">
                        <i class="bi bi-search fs-5 btn-icon-hover" style="color: #4a4a4a;"></i>
                        <div class="position-relative d-inline-flex">
                            <i class="bi bi-bag fs-5 btn-icon-hover" style="color: #4a4a4a;"></i>
                            <span
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-brand-green cart-badge">3</span>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main layout: aside sidebar + products grid -->
    <div class="d-flex flex-column flex-md-row w-100">

        <!-- FILTER SIDEBAR (Left) -->
        <aside class="bg-light flex-shrink-0 border-end"
            style="background-color: #fdfcfa !important; width: 100%; max-width: 320px; border-color: #e8e3dc !important;">
            <div class="p-4">
                <!-- Filters header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fs-5 fw-semibold mb-0" style="color: #1a1a1a;">Filters</h3>
                    <button class="btn btn-link text-decoration-none p-0 small" style="color: #2C5F2D;"
                        id="clearAll">Clear
                        All</button>
                </div>

                <!-- Category filter -->
                <div class="mb-4">
                    <h4 class="fs-6 fw-semibold mb-3" style="color: #1a1a1a;">Category</h4>
                    <div class="d-flex flex-column gap-2">
                        <div class="form-check">
                            <input class="form-check-input categories" type="checkbox" value="T-shirts" id="catTshirts">
                            <label class="form-check-label small" for="catTshirts"
                                style="color: #1a1a1a;">T-shirts</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input categories" type="checkbox" value="Shoes" id="catShorts">
                            <label class="form-check-label small" for="catShorts" style="color: #1a1a1a;">Shoes</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input categories" type="checkbox" value="Shirts" id="catShirts">
                            <label class="form-check-label small" for="catShirts" style="color: #1a1a1a;">Shirts</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input categories" type="checkbox" value="Hoodies" id="catHoodies">
                            <label class="form-check-label small" for="catHoodies"
                                style="color: #1a1a1a;">Hoodies</label>
                        </div>
                    </div>
                </div>

                <!-- Price filter -->
                <div class="mb-4">
                    <h4 class="fs-6 fw-semibold mb-3" style="color: #1a1a1a;">Price</h4>
                    <div class="d-flex flex-column gap-2">
                        <div class="form-check">
                            <input class="form-check-input" id="priceLowToHigh" type="radio" name="priceOrder"
                                value="under 25$" id="priceUnder25">
                            <label class="form-check-label small" for="priceUnder25">Low to High</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" id="priceHighToLow" type="radio" name="priceOrder"
                                value="$25 - $50" id="price25to50">
                            <label class="form-check-label small" for="price25to50">High to Low</label>
                        </div>

                    </div>
                </div>

                <!-- Size filter (pill buttons) -->
                <div class="mb-4">
                    <h4 class="fs-6 fw-semibold mb-3" style="color: #1a1a1a;">Size</h4>
                    <div class="d-flex flex-wrap gap-2">
                        <div class="form-check">
                            <input class="form-check-input d-none" type="checkbox" value="XS" id="sizeXS">
                            <label class="btn btn-sm rounded-pill px-3 py-1" for="sizeXS"
                                style="background-color: #f7f4ef; color: #4a4a4a;">XS</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input d-none" type="checkbox" value="S" id="sizeS" checked>
                            <label class="btn btn-sm rounded-pill px-3 py-1" for="sizeS"
                                style="background-color: #f7f4ef; color: #4a4a4a;">S</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input d-none" type="checkbox" value="M" id="sizeM">
                            <label class="btn btn-sm rounded-pill px-3 py-1" for="sizeM"
                                style="background-color: #f7f4ef; color: #4a4a4a;">M</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input d-none" type="checkbox" value="L" id="sizeL">
                            <label class="btn btn-sm rounded-pill px-3 py-1" for="sizeL"
                                style="background-color: #f7f4ef; color: #4a4a4a;">L</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input d-none" type="checkbox" value="XL" id="sizeXL">
                            <label class="btn btn-sm rounded-pill px-3 py-1" for="sizeXL"
                                style="background-color: #f7f4ef; color: #4a4a4a;">XL</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input d-none" type="checkbox" value="XXL" id="sizeXXL">
                            <label class="btn btn-sm rounded-pill px-3 py-1" for="sizeXXL"
                                style="background-color: #f7f4ef; color: #4a4a4a;">XXL</label>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT: Products area -->
        <main class="flex-grow-1 bg-white px-4 px-lg-5 py-4">
            <!-- Header with results and active filters -->
            <div class="mb-4">
                <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
                    <h1 class="fs-2 fw-semibold mb-0" style="color: #1a1a1a;">Products</h1>
                    <span class="text-secondary-emphasis small" id="showingProductsOutOf"
                        style="color: #707070;"></span>
                </div>
                <!-- Active filter chips -->
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <span class="small text-secondary-emphasis" style="color: #4a4a4a;">Active filters:</span>
                    <div class="d-flex flex-wrap gap-2" id="filter_bar_items">

                    </div>
                </div>
            </div>

            <!-- Products grid: row + cols (Bootstrap grid system) -->
            <div class="row g-4 pb-5" id="products_grid">


                <!-- Load More Button -->

            </div>
        </main>
    </div>

    <!-- Footer (simple with Bootstrap) -->
    <footer class="w-100 border-top" style="background-color: #F7F4EF; border-color: #e8e3dc !important;">
        <div class="container-fluid px-4 px-lg-5 py-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
                <div class="d-flex flex-wrap align-items-center gap-4">
                    <div class="d-flex align-items-center gap-2">
                        <div class="bg-success rounded d-flex align-items-center justify-content-center"
                            style="width: 28px; height: 28px; background-color: #2C5F2D !important;">
                            <i class="bi bi-handbag text-white small"></i>
                        </div>
                        <span class="fw-semibold" style="color: #1a1a1a;">StyleShop</span>
                    </div>
                    <div class="d-flex gap-3">
                        <a href="#" class="text-decoration-none small" style="color: #4a4a4a;">About Us</a>
                        <a href="#" class="text-decoration-none small" style="color: #4a4a4a;">Contact</a>
                        <a href="#" class="text-decoration-none small" style="color: #4a4a4a;">Privacy Policy</a>
                        <a href="#" class="text-decoration-none small" style="color: #4a4a4a;">Terms</a>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-4">
                    <div class="d-flex gap-3">
                        <a href="#" class="text-decoration-none" style="color: #4a4a4a;"><i
                                class="bi bi-facebook fs-5"></i></a>
                        <a href="#" class="text-decoration-none" style="color: #4a4a4a;"><i
                                class="bi bi-twitter-x fs-5"></i></a>
                        <a href="#" class="text-decoration-none" style="color: #4a4a4a;"><i
                                class="bi bi-instagram fs-5"></i></a>
                    </div>
                    <span class="small" style="color: #707070;">© 2024 StyleShop. All rights reserved.</span>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS for responsive navbar toggler -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>


<script>
    const filter_bar_items = document.getElementById('filter_bar_items');
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const showingProductsOutOf = document.getElementById('showingProductsOutOf');
    const clearAll = document.getElementById('clearAll');

    checkboxes.forEach((box) => {
        box.addEventListener('click', () => {
            if (box.checked) {
                const badge = document.createElement('span');
                badge.className = "badge rounded-pill d-flex align-items-center gap-1 px-3 py-1";
                badge.style.backgroundColor = "rgba(44, 95, 45, 0.1)";
                badge.style.color = "#2C5F2D";
                badge.innerHTML = `
                    ${box.value}
                `
                filter_bar_items.appendChild(badge);
            }
            else {
                const items = document.querySelectorAll('#filter_bar_items span');
                items.forEach((item) => {
                    if (item.textContent.includes(box.value)) {
                        filter_bar_items.removeChild(item);
                    }
                })
            }
        })
    });


    let products_data;
    let currentShownData;
    fetch('https://69bea7ae17c3d7d977929e89.mockapi.io/TownTeen/products')
        .then(res => res.json())
        .then(data => {
            products_data = data;
            renderProducts(data);
        });

    let currentProductsCounter = 0;

    function renderProducts(products) {
        currentShownData = products;
        const container = document.getElementById('products_grid');
        // container.innerHTML = ""; // clear old content
        for (const product of products) {
            const card = document.createElement('div');
            card.className = "col-sm-6 col-lg-4 col-xl-3";
            card.innerHTML =
                `
                <div class=" hover-zoom card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="position-relative" style="aspect-ratio: 1/1;">
                        <a href="product_detail.html?id=${product.id}">
                            <img src=${product.image} class="card-img-top  w-100 h-100 object-fit-contain" alt="Performance Athletic">
                        </a>
                        <div class="position-absolute top-0 end-0 m-3">
                            <div class="heart-icon"><i class="bi bi-heart" style="color: #4a4a4a;"></i></div>
                        </div>
                    </div>
                    <div class="card-body p-3">
                        <span class="small text-secondary-emphasis">${product.category}</span>
                        <h3 class="h6 fw-semibold mt-1 mb-2">${product.name}</h3>
                        <div class="fw-bold fs-5" style="color: #2C5F2D;">$${product.price}</div>
                    </div>
                </div>
                `;

            container.appendChild(card);

            const heartIcon = card.querySelector('.heart-icon');
            heartIcon.addEventListener('click', function (e) {
                e.preventDefault();
                const icon = this.querySelector('i');
                if (icon.classList.contains('bi-heart')) {
                    icon.classList.remove('bi-heart');
                    icon.classList.add('bi-heart-fill');
                    icon.style.color = '#e83e8c';
                } else {
                    icon.classList.remove('bi-heart-fill');
                    icon.classList.add('bi-heart');
                    icon.style.color = '#4a4a4a';
                }
            });
        };
    }

    function filterByCategory(categories) {
        let filteredProducts = products_data.filter(product => selectedCategories.includes(product.category));
        if (priceHighToLow.checked) {
            filteredProducts.sort((a, b) => b.price - a.price);
        }
        else if (priceLowToHigh.checked) {
            filteredProducts.sort((a, b) => a.price - b.price);
        }
        console.log(filteredProducts);
        const container = document.getElementById('products_grid');
        container.innerHTML = ""; // clear old content
        renderProducts(filteredProducts);
    }

    clearAll.addEventListener('click', () => {
        checkboxes.forEach((box) => {
            box.checked = false;
        })
        const items = document.querySelectorAll('#filter_bar_items span');
        items.forEach((item) => {
            filter_bar_items.removeChild(item);
        })
        const container = document.getElementById('products_grid');
        container.innerHTML = ""; // clear old content
        renderProducts(products_data);
        selectedCategories = [];
        priceHighToLow.checked = false;
        priceLowToHigh.checked = false;
    })

    let selectedCategories = [];
    const categories = Array.from(document.getElementsByClassName('categories'));
    categories.forEach((category) => {
        category.addEventListener('click', () => {
            if (category.checked) {
                selectedCategories.push(category.value);
            }
            else {
                const index = selectedCategories.indexOf(category.value);
                if (index !== -1) {
                    selectedCategories.splice(index, 1);
                }
            }
            if (selectedCategories.length === 0) {
                renderProducts(products_data);
            }
            else {
                filterByCategory(selectedCategories);
            }
            console.log(selectedCategories);
        })
    });


    const priceLowToHigh = document.getElementById('priceLowToHigh');
    const priceHighToLow = document.getElementById('priceHighToLow');
    priceLowToHigh.addEventListener('click', () => {
        const container = document.getElementById('products_grid');
        container.innerHTML = "";
        renderProducts(currentShownData.sort((a, b) => a.price - b.price));
    });

    priceHighToLow.addEventListener('click', () => {
        const container = document.getElementById('products_grid');
        container.innerHTML = "";
        renderProducts(currentShownData.sort((a, b) => b.price - a.price));
    });
</script>

</html>
